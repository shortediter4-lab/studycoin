<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("message").innerText = "Signup success";
    })
    .catch((error) => {
      document.getElementById("message").innerText = error.message;
    });
};

window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("message").innerText = "Login success";
    })
    .catch((error) => {
      document.getElementById("message").innerText = error.message;
    });
};
</script><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyCoin | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white">
    <div class="glass w-full max-w-[350px] rounded-[30px] p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-yellow-400 tracking-tight">StudyCoin</h1>
            <p class="text-slate-400 text-sm mt-2">Login to your wallet</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <input type="email" id="email" placeholder="Email" required 
                class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 focus:border-yellow-400 outline-none transition-all">
            
            <input type="password" id="password" placeholder="Password" required 
                class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 focus:border-yellow-400 outline-none transition-all">
            
        <button type="button" onclick="handleAuth()" class="w-full bg-yellow-400 text-black font-bold py-4 rounded-2xl hover:bg-yellow-300 active:scale-95 transition-all">Sign In</button>


<p id="toggle-text" class="text-center mt-4 text-sm text-slate-400">
  Don't have an account? 
  <span onclick="toggleForm()" class="text-yellow-400 cursor-pointer">Sign Up</span>
</p>

        </form>
    </div>

   <script src="script.js"></script> 
</body>
</html>
