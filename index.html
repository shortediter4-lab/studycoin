<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyCoin Login</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 50px; background: #121212; color: white; }
        .login-card { background: #1e1e1e; padding: 30px; border-radius: 15px; display: inline-block; width: 300px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 95%; padding: 10px; background: #22d3ee; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #msg { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>StudyCoin Login</h2>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button id="loginBtn">Login</button>
        <button id="signupBtn" style="background: #444; margin-top: 10px;">Create Account</button>
        <p id="msg"></p>
    </div>

    <script type="module">
        // 1. Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 2. Your Correct Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyADsDs1QtO2lai8DzA4JxvKg7Nf1lDk5E",
            authDomain: "studycoin-stc.firebaseapp.com",
            projectId: "studycoin-stc",
            storageBucket: "studycoin-stc.firebasestorage.app",
            messagingSenderId: "840351904766",
            appId: "1:840351904766:web:7ec85a6e8d2cdfa4c246af"
        };

        // 3. Initialize
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const msg = document.getElementById('msg');

        // SIGN UP FUNCTION
        document.getElementById('signupBtn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            createUserWithEmailAndPassword(auth, email, password)
                .then(() => { msg.innerText = "Account Created!"; msg.style.color = "green"; })
                .catch((err) => { msg.innerText = err.message; msg.style.color = "red"; });
        });

        // LOGIN FUNCTION
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then(() => { msg.innerText = "Login Successful!"; msg.style.color = "green"; })
                .catch((err) => { msg.innerText = err.message; msg.style.color = "red"; });
        });
    </script>
</body>
</html>
